name: Tests

on: pull_request

jobs:
  run-unit-tests:

    timeout-minutes: 7

    runs-on: ubuntu-latest
    container: compucorp/civicrm-buildkit:1.3.1-php8.0

    env:
      CIVICRM_EXTENSIONS_DIR: site/web/sites/all/modules/civicrm/tools/extensions
      CIVICRM_SETTINGS_DIR: site/web/sites/default

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:

      - name: Config mysql database as per CiviCRM requirement
        run: echo "SET GLOBAL sql_mode=(SELECT REPLACE(@@sql_mode,'ONLY_FULL_GROUP_BY',''));" | mysql -u root --password=root --host=mysql

      - name: Config amp
        run : amp config:set --mysql_dsn=mysql://root:root@mysql:3306

      - name: Build Drupal site
        run: civibuild create drupal-clean --civi-ver 5.51.3 --cms-ver 7.79 --web-root $GITHUB_WORKSPACE/site

      - uses: compucorp/apply-patch@1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repo: compucorp/civicrm-core
          version: 5.51.3
          path: site/web/sites/all/modules/civicrm

      - uses: actions/checkout@v2
        with:
          path: ${{ env.CIVICRM_EXTENSIONS_DIR }}/uk.co.compucorp.membershipextrasimporterapi

      - name: Configure GoCardless settings
        working-directory: ${{ env.CIVICRM_SETTINGS_DIR }}
        run: |
          echo "\$civicrm_setting['domain']['gocardless_live_client_id'] = 'test';" >> civicrm.settings.php
          echo "\$civicrm_setting['domain']['gocardless_live_secret_id'] = 'test';" >> civicrm.settings.php
          echo "\$civicrm_setting['domain']['gocardless_test_client_id'] = 'test';" >> civicrm.settings.php
          echo "\$civicrm_setting['domain']['gocardless_test_secret_id'] = 'test';" >> civicrm.settings.php
          echo "\$civicrm_setting['domain']['gocardless_webhook_secret'] = 'test';" >> civicrm.settings.php

      - name: Installing Membershipextras Importer API extension and its dependencies
        working-directory: ${{ env.CIVICRM_EXTENSIONS_DIR }}
        env:
          GH_TOKEN: ${{ secrets.BASE64_PRIVATE_ACCESS_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/compucorp/uk.co.compucorp.membershipextras.git
          git clone --depth 1 https://github.com/compucorp/uk.co.compucorp.manualdirectdebit.git
          git clone --depth 1 https://github.com/compucorp/io.compuco.financeextras.git
          git clone --depth 1 https://github.com/compucorp/io.compuco.automateddirectdebit.git
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/compucorp/io.compuco.gocardless.git
          composer install --no-dev --no-interaction --working-dir=io.compuco.gocardless
          git clone --depth 1 -b 1.10-patches https://github.com/compucorp/nz.co.fuzion.csvimport.git
          cv en uk.co.compucorp.membershipextras uk.co.compucorp.manualdirectdebit io.compuco.automateddirectdebit io.compuco.financeextras io.compuco.gocardless nz.co.fuzion.csvimport uk.co.compucorp.membershipextrasimporterapi

      - name: Run phpunit tests
        working-directory: ${{ env.CIVICRM_EXTENSIONS_DIR }}/uk.co.compucorp.membershipextrasimporterapi
        run: phpunit9
